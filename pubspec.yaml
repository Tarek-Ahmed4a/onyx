name: onyx
description: "A new Flutter application for personal finance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.7
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  table_calendar: ^3.2.0
  google_nav_bar: ^5.0.7
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_colorpicker: ^1.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  flutter_markdown: ^0.7.7+1
  http: ^1.6.0
  url_launcher: ^6.2.5
  provider: ^6.1.2
  connectivity_plus: ^6.0.3
  intl: 0.20.2
  logger: ^2.7.0
  fl_chart: ^0.70.2
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  animations: ^2.0.11
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/onyx_config.txt
