name: ONYX Market Scanner

on:
  schedule:
    # Runs every 15 minutes, Sunday to Thursday, during EGX market hours (Approx 07:00 - 13:00 UTC)
    - cron: '*/15 7-12 * * 0-4'
  workflow_dispatch: # Allow manual trigger

jobs:
  scan_market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend_scripts/package.json

      - name: Install Dependencies
        run: |
          cd backend_scripts
          npm install

      - name: Run Market Scanner
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd backend_scripts
          node scanner.js
