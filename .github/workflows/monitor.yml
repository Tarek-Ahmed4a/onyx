name: Onyx Stock Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل كل ربع ساعة
  workflow_dispatch: # تشغيل يدوي

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # الطريقة الأضمن لإنشاء ملف مفتاح فايربيز من غير مشاكل الرموز
      - name: Create Firebase Key File
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_JSON }}
        run: echo "$FIREBASE_CREDENTIALS" > firebase-key.json

      # تشغيل السكريبت مع تمرير مفتاح Gemini كمتغير بيئة (Environment Variable)
      - name: Run Monitor Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor.py