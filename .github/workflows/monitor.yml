name: Onyx Stock Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin yfinance pandas google-genai
          pip install git+https://github.com/rongardF/tvdatafeed.git
          
      - name: Create Firebase Key File
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_JSON }}
        run: echo "$FIREBASE_CREDENTIALS" > firebase-key.json

      - name: Run Monitor Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_JSON }}
        run: python monitor.py