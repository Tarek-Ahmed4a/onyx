name: Onyx Stock Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-22.04 # تثبيت نسخة مستقرة لضمان وجود الـ Wheels
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies Directly
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # تسطيب نسخ محددة ومستقرة إجبارياً
          pip install numpy==1.26.4 pandas==2.2.1
          # تسطيب باقي المكتبات الخاصة بالمشروع
          pip install firebase-admin yfinance google-generativeai

      - name: Create Firebase Key File
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_JSON }}
        run: echo "$FIREBASE_CREDENTIALS" > firebase-key.json

      - name: Run Monitor Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor.py